{% extends 'base.html' %}
{% block title %}Chat{% endblock %}

{% block content %}

<div style="margin-bottom:16px;">
  <h1 style="font-family:var(--font-title);font-weight:800;font-size:28px;letter-spacing:-.5px;color:var(--text);">Chat</h1>
</div>

<div style="border-radius:var(--radius-xl);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden;height:560px;max-height:80vh;">

  {# Cabecera de sala #}
  <div style="height:66px;border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;flex-shrink:0;">
    <div style="width:38px;height:38px;border-radius:12px;background:var(--accent);color:var(--ac-text);display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-weight:800;font-size:16px;flex-shrink:0;">
      6
    </div>
    <div>
      <div style="font-family:var(--font-title);font-weight:800;font-size:16px;color:var(--text);">General</div>
      <div style="font-family:var(--font-body);font-size:12px;color:var(--dim);" id="chat-status">Conectando...</div>
    </div>
    <div style="margin-left:auto;"><span class="dot-online"></span></div>
  </div>

  {# Área de mensajes #}
  <div id="chat-messages"
       style="flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:14px;">
    <div id="load-more-container" style="text-align:center;display:none;">
      <button id="load-more-btn"
              style="background:none;border:1px solid var(--border);cursor:pointer;font-family:var(--font-body);font-size:12px;color:var(--dim);padding:6px 14px;border-radius:var(--radius-pill);">
        Cargar mensajes anteriores
      </button>
    </div>
  </div>

  {# Input #}
  <div style="border-top:1px solid var(--border);padding:13px 16px;flex-shrink:0;display:flex;align-items:center;gap:10px;">
    <input id="chat-input"
           type="text"
           placeholder="Escribe un mensaje..."
           maxlength="2000"
           autocomplete="off"
           style="flex:1;height:42px;border-radius:13px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;padding:0 13px;outline:none;transition:border-color .15s ease;"
           onfocus="this.style.borderColor='var(--accent)'"
           onblur="this.style.borderColor='var(--border)'">
    <button id="chat-send"
            style="width:42px;height:42px;border-radius:13px;border:none;background:var(--accent);color:var(--ac-text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:filter .15s ease;"
            onmouseenter="this.style.filter='brightness(1.08)'"
            onmouseleave="this.style.filter='none'"
            aria-label="Enviar">↑</button>
  </div>

</div>
{% endblock %}

{% block extra_js %}
<script>
(function () {
  var currentUser = '{{ request.user.get_full_name|default:request.user.email|escapejs }}';
  var wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
  var ws = new WebSocket(wsProtocol + window.location.host + '/ws/chat/');

  var messagesDiv = document.getElementById('chat-messages');
  var loadMoreContainer = document.getElementById('load-more-container');
  var loadMoreBtn = document.getElementById('load-more-btn');
  var statusEl = document.getElementById('chat-status');
  var input = document.getElementById('chat-input');
  var oldestId = null;

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function buildMessageEl(msg) {
    var isOwn = msg.user === currentUser;
    var div = document.createElement('div');
    div.dataset.msgId = msg.id;
    div.style.cssText = 'display:flex;align-items:flex-end;gap:8px;' + (isOwn ? 'flex-direction:row-reverse;' : '');
    var initials = msg.user.charAt(0).toUpperCase();
    var bubbleBg = isOwn ? 'var(--accent-soft)' : 'var(--surface2)';
    div.innerHTML =
      '<div style="width:30px;height:30px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-weight:800;font-size:11px;color:var(--text);flex-shrink:0;">' + escapeHtml(initials) + '</div>' +
      '<div style="max-width:75%;background:' + bubbleBg + ';border:1px solid var(--border);border-radius:14px;padding:9px 13px;">' +
        (!isOwn ? '<div style="font-family:var(--font-body);font-weight:700;font-size:12px;color:var(--text);margin-bottom:3px;">' + escapeHtml(msg.user) + '</div>' : '') +
        '<div style="font-family:var(--font-body);font-size:14px;line-height:1.5;color:var(--text);">' + escapeHtml(msg.content) + '</div>' +
        '<div style="font-family:var(--font-body);font-size:10px;color:var(--dim);margin-top:4px;text-align:right;">' + escapeHtml(msg.timestamp) + '</div>' +
      '</div>';
    return div;
  }

  ws.onopen = function () { statusEl.textContent = 'Sala general · en línea'; };
  ws.onclose = function () { statusEl.textContent = 'Desconectado · recarga la página'; statusEl.style.color = 'var(--error)'; };

  ws.onmessage = function (event) {
    var data = JSON.parse(event.data);
    if (data.type === 'history') {
      data.messages.forEach(function (msg) {
        if (oldestId === null || msg.id < oldestId) oldestId = msg.id;
        messagesDiv.appendChild(buildMessageEl(msg));
      });
      loadMoreContainer.style.display = data.has_more ? 'block' : 'none';
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } else if (data.type === 'message') {
      if (oldestId === null || data.message.id < oldestId) oldestId = data.message.id;
      messagesDiv.appendChild(buildMessageEl(data.message));
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    } else if (data.type === 'older_messages') {
      var prevH = messagesDiv.scrollHeight;
      var anchor = loadMoreContainer.nextSibling;
      data.messages.forEach(function (msg) {
        if (oldestId === null || msg.id < oldestId) oldestId = msg.id;
        messagesDiv.insertBefore(buildMessageEl(msg), anchor);
      });
      messagesDiv.scrollTop = messagesDiv.scrollHeight - prevH;
      loadMoreContainer.style.display = data.has_more ? 'block' : 'none';
    }
  };

  loadMoreBtn.addEventListener('click', function () {
    if (oldestId !== null && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'load_more', before_id: oldestId }));
    }
  });

  function sendMessage() {
    var content = input.value.trim();
    if (content && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ content: content }));
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendMessage);
  input.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
})();
</script>
{% endblock %}
