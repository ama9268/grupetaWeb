{% extends 'base.html' %}
{% block title %}Chat — GrupetaWeb{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto flex flex-col h-[70vh]">
    <h1 class="text-xl font-bold text-gray-900 mb-4">Chat del grupo</h1>

    <div id="chat-messages"
         class="flex-1 overflow-y-auto bg-white rounded-lg shadow p-4 space-y-3 mb-4">

        <div id="load-more-container" class="text-center hidden">
            <button id="load-more-btn"
                    class="text-sm text-gray-500 hover:text-gray-800 underline py-1">
                Cargar mensajes anteriores
            </button>
        </div>

        <p id="connecting-msg" class="text-gray-400 text-sm text-center">Conectando...</p>
    </div>

    <div class="bg-white rounded-lg shadow p-3 flex space-x-3">
        <input id="chat-input"
               type="text"
               placeholder="Escribe un mensaje..."
               class="flex-1 border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:border-gray-500"
               maxlength="2000"
               autocomplete="off">
        <button id="chat-send"
                class="bg-gray-900 text-white px-4 py-2 rounded text-sm hover:bg-gray-700">
            Enviar
        </button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const currentUser = '{{ request.user.get_full_name|default:request.user.email|escapejs }}';
const wsProtocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
const ws = new WebSocket(wsProtocol + window.location.host + '/ws/chat/');

const messagesDiv = document.getElementById('chat-messages');
const loadMoreContainer = document.getElementById('load-more-container');
const loadMoreBtn = document.getElementById('load-more-btn');
const connectingMsg = document.getElementById('connecting-msg');
const input = document.getElementById('chat-input');

let oldestId = null;

function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function buildMessageEl(msg) {
    const isOwn = msg.user === currentUser;
    const div = document.createElement('div');
    div.className = 'flex ' + (isOwn ? 'justify-end' : 'justify-start');
    div.dataset.msgId = msg.id;
    div.innerHTML = `
        <div class="max-w-[75%] ${isOwn ? 'bg-gray-900 text-white' : 'bg-gray-100 text-gray-900'} rounded-lg px-3 py-2">
            ${!isOwn ? `<p class="text-xs font-semibold mb-1 opacity-70">${escapeHtml(msg.user)}</p>` : ''}
            <p class="text-sm">${escapeHtml(msg.content)}</p>
            <p class="text-xs opacity-50 mt-1 text-right">${msg.timestamp}</p>
        </div>`;
    return div;
}

function appendMessage(msg) {
    messagesDiv.appendChild(buildMessageEl(msg));
    if (oldestId === null || msg.id < oldestId) oldestId = msg.id;
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function prependMessages(msgs) {
    const prevHeight = messagesDiv.scrollHeight;
    // Insert after the load-more button, before the first real message
    const anchor = loadMoreContainer.nextSibling;
    msgs.forEach(msg => {
        if (oldestId === null || msg.id < oldestId) oldestId = msg.id;
        messagesDiv.insertBefore(buildMessageEl(msg), anchor);
    });
    // Keep scroll position stable
    messagesDiv.scrollTop = messagesDiv.scrollHeight - prevHeight;
}

ws.onopen = () => {
    connectingMsg && connectingMsg.remove();
};

ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === 'history') {
        connectingMsg && connectingMsg.remove();
        data.messages.forEach(msg => {
            if (oldestId === null || msg.id < oldestId) oldestId = msg.id;
            messagesDiv.appendChild(buildMessageEl(msg));
        });
        loadMoreContainer.classList.toggle('hidden', !data.has_more);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

    } else if (data.type === 'message') {
        appendMessage(data.message);

    } else if (data.type === 'older_messages') {
        prependMessages(data.messages);
        loadMoreContainer.classList.toggle('hidden', !data.has_more);
    }
};

ws.onclose = () => {
    const p = document.createElement('p');
    p.className = 'text-red-500 text-sm text-center py-2';
    p.textContent = 'Conexión cerrada. Recarga la página.';
    messagesDiv.appendChild(p);
};

loadMoreBtn.addEventListener('click', () => {
    if (oldestId !== null && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'load_more', before_id: oldestId}));
    }
});

function sendMessage() {
    const content = input.value.trim();
    if (content && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({content}));
        input.value = '';
    }
}

document.getElementById('chat-send').addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
{% endblock %}
