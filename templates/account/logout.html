{% extends 'base.html' %}
{% block title %}Cerrar sesión — GrupetaWeb{% endblock %}
{% block content %}
<div class="min-h-[50vh] flex items-center justify-center">
    <div class="max-w-sm w-full bg-white rounded-lg shadow p-8 text-center">
        <h1 class="text-xl font-bold text-gray-900 mb-4">¿Cerrar sesión?</h1>
        <form method="post" action="{% url 'account_logout' %}">
            {% csrf_token %}
            <button type="submit"
                    class="w-full bg-gray-900 text-white py-2 rounded hover:bg-gray-700 mb-3">
                Sí, cerrar sesión
            </button>
        </form>
        <a href="/" class="text-sm text-gray-500 hover:underline">Cancelar</a>
    </div>
</div>
{% endblock %}
