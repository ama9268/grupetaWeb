{% extends 'base.html' %}
{% block title %}Cerrar sesión{% endblock %}

{% block content %}
<div style="min-height:50vh;display:flex;align-items:center;justify-content:center;">
  <div class="card" style="max-width:340px;width:100%;text-align:center;border-radius:var(--radius-xl);padding:28px 24px;">

    <p style="font-family:var(--font-title);font-weight:800;font-size:22px;letter-spacing:-.4px;color:var(--text);margin-bottom:10px;">
      ¿Salir de la grupeta?
    </p>
    <p style="font-family:var(--font-body);font-size:14px;color:var(--dim);margin-bottom:22px;line-height:1.5;">
      Tu sesión se cerrará. Puedes volver cuando quieras.
    </p>

    <form method="post" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit" class="btn-primary full" style="margin-bottom:10px;">
        Sí, cerrar sesión
      </button>
    </form>

    <a href="/"
       style="font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--dim);">
      Cancelar
    </a>
  </div>
</div>
{% endblock %}
