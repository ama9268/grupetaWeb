<span id="like-btn-{{ post.pk }}">
  <form method="post" action="{% url 'blog:toggle_like' post.pk %}"
        hx-post="{% url 'blog:toggle_like' post.pk %}"
        hx-target="#like-btn-{{ post.pk }}"
        hx-swap="outerHTML"
        style="display:inline">
    {% csrf_token %}
    <button type="submit"
            style="display:inline-flex;align-items:center;gap:6px;border-radius:22px;padding:9px 18px;font-family:var(--font-body);font-weight:700;font-size:14px;cursor:pointer;border:none;transition:filter .15s ease;
            {% if user_liked %}background:var(--accent);color:var(--ac-text);
            {% else %}background:var(--bg);border:1px solid var(--border);color:var(--text);{% endif %}">
      {% if user_liked %}♥{% else %}♡{% endif %}
      <span>{{ likes_count }}</span>
    </button>
  </form>
</span>
