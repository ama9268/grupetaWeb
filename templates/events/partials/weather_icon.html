{% comment %}
Icono de cielo para la tarjeta de previsión meteorológica (event_detail.html). Espera
`icon`: una de las claves de apps/events/weather.py::_SKY_ICONS ('sun'/'cloud'/'rain'/
'snow'/'storm'; cualquier otro valor cae en 'cloud').
{% endcomment %}
<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
  {% if icon == 'sun' %}
  <circle cx="12" cy="12" r="5"/>
  <line x1="12" y1="1" x2="12" y2="3"/>
  <line x1="12" y1="21" x2="12" y2="23"/>
  <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
  <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
  <line x1="1" y1="12" x2="3" y2="12"/>
  <line x1="21" y1="12" x2="23" y2="12"/>
  <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
  <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  {% elif icon == 'rain' %}
  <path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25"/>
  <line x1="8" y1="19" x2="8" y2="21"/>
  <line x1="12" y1="19" x2="12" y2="21"/>
  <line x1="16" y1="19" x2="16" y2="21"/>
  {% elif icon == 'snow' %}
  <path d="M20 17.58A5 5 0 0 0 18 8h-1.26A8 8 0 1 0 4 16.25"/>
  <line x1="8" y1="16" x2="8.01" y2="16"/>
  <line x1="8" y1="20" x2="8.01" y2="20"/>
  <line x1="12" y1="18" x2="12.01" y2="18"/>
  <line x1="12" y1="22" x2="12.01" y2="22"/>
  <line x1="16" y1="16" x2="16.01" y2="16"/>
  <line x1="16" y1="20" x2="16.01" y2="20"/>
  {% elif icon == 'storm' %}
  <path d="M19 16.9A5 5 0 0 0 18 7h-1.26a8 8 0 1 0-11.62 9"/>
  <polyline points="13 11 9 17 15 17 11 23"/>
  {% else %}
  <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
  {% endif %}
</svg>
