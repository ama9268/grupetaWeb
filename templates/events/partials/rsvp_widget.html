<div id="rsvp-widget" class="bg-gray-50 rounded-lg p-4">
    <h3 class="font-semibold text-gray-800 mb-3">¿Vas al evento?</h3>
    <div class="flex space-x-3 mb-4">
        <form hx-post="{% url 'events:rsvp' event.pk 'attending' %}"
              hx-target="#rsvp-widget"
              hx-swap="outerHTML">
            {% csrf_token %}
            <button type="submit"
                    class="px-4 py-2 rounded text-sm font-medium
                    {% if user_rsvp.response == 'attending' %}bg-green-600 text-white
                    {% else %}border border-green-600 text-green-700 hover:bg-green-50{% endif %}">
                Voy ({{ event.attending_count }})
            </button>
        </form>
        <form hx-post="{% url 'events:rsvp' event.pk 'not_attending' %}"
              hx-target="#rsvp-widget"
              hx-swap="outerHTML">
            {% csrf_token %}
            <button type="submit"
                    class="px-4 py-2 rounded text-sm font-medium
                    {% if user_rsvp.response == 'not_attending' %}bg-red-600 text-white
                    {% else %}border border-red-300 text-red-600 hover:bg-red-50{% endif %}">
                No voy
            </button>
        </form>
    </div>
    {% if attendees %}
    <p class="text-xs text-gray-600 font-medium mb-2">Confirmados:</p>
    <div class="flex flex-wrap gap-2">
        {% for rsvp in attendees %}
        <span class="text-xs bg-white border border-gray-200 rounded px-2 py-1">
            {{ rsvp.user.get_full_name|default:rsvp.user.email }}
        </span>
        {% endfor %}
    </div>
    {% endif %}
</div>
